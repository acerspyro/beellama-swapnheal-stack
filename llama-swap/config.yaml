listen: "0.0.0.0:8000"
startTimeout: 300
idleTimeout: 600

models:
  qwen-logic:
    cmd: >
      beellama-server 
      -hf unsloth/Qwen3.6-35B-A3B-GGUF:Q4_K_M
      -hfd Anbeeld/Qwen3.6-DFlash-Draft-1.5B-GGUF:Q8_0
      --spec-type dflash
      --port ${PORT}
      -ngl all
      --flash-attn
      -c 65536
      --cache-type-k turbo4
      --cache-type-v turbo4
      --reasoning on
    ttl: 600 # Keep in VRAM for 10 mins (Reasoning is slow to reload)

  gemma-tools:
    cmd: >
      beellama-server 
      -hf google/gemma-4-26b-a4b-GGUF:Q4_K_M
      --port ${PORT}
      -ngl all
      --flash-attn
      -c 32768
      --cache-type-k turbo3
      --cache-type-v turbo3
      --reasoning off
    ttl: 300 # Swaps out faster once the task is done
