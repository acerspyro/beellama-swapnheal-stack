events {
    worker_connections 1024;
}

http {
    gzip on;

    upstream open_webui {
        server open-webui:8080;
    }

    upstream tool_healing {
        server tool-healing:8081;
    }

    upstream mcp_gateway {
        server mcp-proxy:3000;
    }

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile          on;
    keepalive_timeout 65;

    server {
        listen 80;

        location / {
            proxy_pass         http://open_webui;
            proxy_set_header   Host                   $host;
            proxy_set_header   X-Real-IP              $remote_addr;
            proxy_set_header   X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto      $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header   Upgrade                $http_upgrade;
            proxy_set_header   Connection             "upgrade";

            # Increase timeouts for long-running LLM requests
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Route any OpenAI-compatible API calls through the healer
        location /v1/ {
            proxy_pass         http://tool_healing/v1/;
            proxy_set_header   Host                   $host;
            proxy_set_header   X-Real-IP              $remote_addr;
            proxy_set_header   X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto      $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Optional: expose the MCP Gateway behind nginx for browser-based tools
        location /mcp/ {
            proxy_pass         http://mcp_gateway/;
            proxy_set_header   Host                   $host;
            proxy_set_header   X-Real-IP              $remote_addr;
            proxy_set_header   X-Forwarded-For        $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto      $scheme;
        }
    }
}
